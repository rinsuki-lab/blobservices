syntax = "proto2";

package blobservices.manager;

import "core.proto";

message BlobInfo {
    required bytes id = 1;
    required uint64 size = 2;
    required core.BlobHashes hashes = 3;
}

message BlobLocation {
    reserved 1;
    required string storage = 2;
    required string address = 3;
}

message GetBlobRefResponse {
    reserved 1;
    required BlobInfo blob = 2;
    repeated BlobLocation locations = 3;
}

message PutBlobRefRequest {
    oneof content {
        // 将来的に namespace/key でアクセス制御をかける予定なので、それをバイパスしてblobを直指定できるこれは unsafe
        PutBlobRefWithBlobId unsafeSetBlobId = 1;
        // 任意の storage/address を指定できるこれは unsafe (将来的に storage からの証明を付ける)
        PutBlobRefWithNewBlobInfo unsafeNewBlob = 2;
        // PutBlobRefFromOtherRef fromOtherRef = 3;
    }
}

message PutBlobRefWithBlobId {
    required bytes blob_id = 1;
}

message PutBlobRefWithNewBlobInfo {
    required uint64 size = 2;
    required core.BlobHashes hashes = 3;
    required string storage = 4;
    required string address = 5;
}

